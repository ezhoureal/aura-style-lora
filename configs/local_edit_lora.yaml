selected_models:
  - sd35_medium

dataset:
  train_dir: dataset/train
  conditioning_key: conditioning_path
  image_key: file_name
  prompt_key: prompt
  kind_key: kind
  paired_kind: paired
  resolution: 1024
  center_crop: true
  random_flip: false

training:
  output_root: outputs/ablation/local_edit_lora
  max_train_steps: 2000
  train_batch_size: 2
  gradient_accumulation_steps: 2
  learning_rate: 8e-5
  lr_scheduler: cosine
  lr_warmup_steps: 50
  rank: 16
  lora_alpha: 16
  seed: 42
  mixed_precision: bf16
  gradient_checkpointing: true
  allow_tf32: true
  dataloader_num_workers: 2
  checkpointing_steps: 250
  resume_from_checkpoint: null # latest / null / specific path
  max_grad_norm: 1.0
  guidance_scale: 4.0
  max_sequence_length: 256
  text_encoder_device: cuda
  prompt_embed_batch_size: 2
  text_encoder_out_layers:
    - 9
    - 18
    - 27
  local_files_only: true # switch to false if base model not already downloaded
  flux2_target_modules:
    - to_q
    - to_k
    - to_v
    - to_out.0
    - add_q_proj
    - add_k_proj
    - add_v_proj
    - to_add_out
  sd3_target_modules:
    - to_q
    - to_k
    - to_v
    - to_out.0
    - add_q_proj
    - add_k_proj
    - add_v_proj
    - to_add_out
  sd3_disable_t5: false

evaluation:
  input_dir: dataset/eval
  output_root: outputs/ablation/local_edit_eval
  checkpoint_dir: null
  prompt: "A strong colorful light is illuminating the subject's silhouette. The image is rendered in a smooth gradient of luminous light, giving a radiant and ethereal appearance. Subtle contour lighting highlights delicate outlines, adding depth and a refined, high-end cinematic glow"
  batch_size: 2
  height: ${dataset.resolution}
  width: ${dataset.resolution}
  num_inference_steps: 50
  guidance_scale: 4.0
  sd3_guidance_scale: 1.0
  image_guidance_scale: 1.5
  lora_scale: 1.0
  seed: 42
  mixed_precision: bf16
  limit: null
  max_sequence_length: 256
  text_encoder_out_layers:
    - 9
    - 18
    - 27
  local_files_only: true
  sd3_disable_t5: false

environment:
  hf_endpoint: https://hf-mirror.com
  hf_hub_enable_hf_transfer: "1"

models:
  sd15:
    display_name: Stable Diffusion 1.5
    pretrained_model_name_or_path: ${oc.env:SD15_MODEL_PATH,.hf_models/sd15}
    trainer: stable_diffusion_ip2p_lora
    revision: null
    prediction_type: null
    variant: null
  sd21:
    display_name: Stable Diffusion 2.1
    pretrained_model_name_or_path: sd2-community/stable-diffusion-2-1
    trainer: stable_diffusion_ip2p_lora
    revision: null
    prediction_type: null
    variant: fp16
  sd35_medium:
    display_name: Stable Diffusion 3.5 Medium
    pretrained_model_name_or_path: ${oc.env:SD35_MEDIUM_MODEL_PATH,.hf_models/sd35-medium}
    trainer: stable_diffusion_3_paired_edit_lora
    revision: null
    variant: null
  flux2_klein_base:
    display_name: FLUX.2 Klein Base 4B
    pretrained_model_name_or_path: ${oc.env:FLUX2_KLEIN_BASE_PATH,.hf_models/flux2-klein-base-4b}
    trainer: flux2_paired_edit_lora
