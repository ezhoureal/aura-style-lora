selected_models: null

dataset:
  train_dir: training_data/flux_aura_style/train
  conditioning_key: conditioning_path
  image_key: file_name
  prompt_key: prompt
  kind_key: kind
  paired_kind: paired
  resolution: 512
  center_crop: true
  random_flip: false

training:
  output_root: outputs/ablation/local_edit_lora
  max_train_steps: 1000
  train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 1e-4
  lr_scheduler: constant
  lr_warmup_steps: 0
  rank: 8
  lora_alpha: 8
  seed: 42
  mixed_precision: bf16
  gradient_checkpointing: true
  allow_tf32: true
  dataloader_num_workers: 2
  checkpointing_steps: 250
  max_grad_norm: 1.0

evaluation:
  input_dir: eval_data
  output_root: outputs/ablation/local_edit_eval
  checkpoint_dir: null
  prompt: "Transform this photorealistic image into the trained radiant aura style while preserving the subject identity, composition, pose, silhouette, camera framing, and important details."
  num_inference_steps: 28
  guidance_scale: 7.5
  image_guidance_scale: 1.5
  lora_scale: 1.0
  seed: 42
  mixed_precision: bf16
  limit: null

environment:
  hf_endpoint: https://hf-mirror.com
  hf_hub_enable_hf_transfer: "1"

models:
  sd15:
    display_name: Stable Diffusion 1.5
    pretrained_model_name_or_path: stable-diffusion-v1-5/stable-diffusion-v1-5
    trainer: stable_diffusion_ip2p_lora
    revision: null
    prediction_type: null
    variant: null
  sd21:
    display_name: Stable Diffusion 2.1
    pretrained_model_name_or_path: sd2-community/stable-diffusion-2-1
    trainer: stable_diffusion_ip2p_lora
    revision: null
    prediction_type: null
    variant: fp16
  sd35_medium:
    display_name: Stable Diffusion 3.5 Medium
    pretrained_model_name_or_path: stabilityai/stable-diffusion-3.5-medium
    trainer: unsupported_local_edit
    note: Local paired edit LoRA support is not implemented for SD3 transformer edit APIs yet.
  flux2_klein_base:
    display_name: FLUX.2 Klein Base 4B
    pretrained_model_name_or_path: black-forest-labs/FLUX.2-klein-base-4B
    trainer: unsupported_local_edit
    note: Local paired edit LoRA support is not implemented for FLUX.2 transformer edit APIs yet; use the fal edit trainer until a local transformer adapter is added.
