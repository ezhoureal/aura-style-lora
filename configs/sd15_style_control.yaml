defaults:
  - environment: huggingface_mirror
  - models: sd15_style_control
  - _self_

workflow:
  stage: 0
  description: SD1.5 realistic img2img and ControlNet style-transfer baselines.

stage0:
  input_dir: dataset/eval
  style_image_path: dataset/style/aura_style.png
  output_root: outputs/no_lora/sd15_style_control
  selected_baselines:
    - a_img2img
    - b_control_canny
    - c_control_lineart
  baselines:
    a_img2img:
      display_name: A SD1.5 img2img, no LoRA
      use_style_lora: false
      controls: []
    b_control_canny:
      display_name: B SD1.5 + ControlNet Canny, no LoRA
      use_style_lora: false
      controls:
        - canny
    c_control_lineart:
      display_name: C SD1.5 + ControlNet Lineart, no LoRA
      use_style_lora: false
      controls:
        - lineart
    d_control_lineart_depth:
      display_name: D SD1.5 + ControlNet Lineart/Depth, no LoRA
      use_style_lora: false
      controls:
        - lineart
        - depth
    e_lora:
      display_name: B SD1.5 + style LoRA
      use_style_lora: true
      controls: []
    f_lora_canny:
      display_name: C SD1.5 + style LoRA + ControlNet Canny
      use_style_lora: true
      controls:
        - canny
    g_lora_lineart_depth:
      display_name: D SD1.5 + style LoRA + ControlNet Lineart/Depth
      use_style_lora: true
      controls:
        - lineart
        - depth
  prompt_template: "<AURA_STYLE> style, {caption}"
  negative_prompt: "deformed, disfigured, low quality, blurry, jpeg artifacts, bad anatomy, bad hands, extra limbs, text, watermark, cartoon, anime, cgi, 3d render"
  default_caption: "a photorealistic subject"
  caption_metadata_path: null
  image_key: file_name
  caption_key: caption
  width: 512
  height: 512
  strength: 0.62
  num_inference_steps: 35
  guidance_scale: 6.5
  seed: 42
  limit: null
  mixed_precision: fp16
  attention_slicing: true
  vae_slicing: true
  model_cpu_offload: false
